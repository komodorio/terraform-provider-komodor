# ── YAML Anchors ──────────────────────────────────────────────────────────
# Resolved at parse time; the x-config key is ignored by Buildkite.
x-config:
  agents: &dind
    builder: "dind"

  # Docker plugin config for steps that genuinely need a specific image.
  golang_docker: &golang_docker
    workdir: /workspace
    volumes:
      - ".:/workspace"

  # Common Go environment variable sets.
  go_env: &go_env
    GO111MODULE: "on"
    GOFLAGS: "-buildvcs=false"

  go_build_env: &go_build_env
    GO111MODULE: "on"
    CGO_ENABLED: "0"
    GOFLAGS: "-buildvcs=false"

steps:
  # ── Stage 1 & 2 & 3: Code Quality, Tests, Static Checks (all parallel) ──

  - label: ":lint-roller: fmt check"
    command: |
      unformatted=$$(gofmt -l .)
      if [ -n "$$unformatted" ]; then
        echo "The following files need formatting (run: gofmt -w .):"
        echo "$$unformatted"
        exit 1
      fi
    agents: *dind
    env: *go_env

  - label: ":package: mod tidy"
    command: |
      go mod tidy
      if ! git diff --exit-code go.mod go.sum; then
        echo "ERROR: go.mod/go.sum are out of sync. Run 'go mod tidy' and commit the result."
        exit 1
      fi
    agents: *dind
    env: *go_env

  - label: ":mag: vet"
    command: go vet ./...
    agents: *dind
    env: *go_build_env

  - label: ":rotating_light: lint"
    command: golangci-lint run --timeout=5m
    agents: *dind
    plugins:
      - docker#v5.12.0:
          <<: *golang_docker
          image: golangci/golangci-lint:latest

  - label: ":test_tube: Unit Tests"
    command: go test -race -count=1 -v ./komodor/... -timeout 60s
    agents: *dind
    env:
      GO111MODULE: "on"
      CGO_ENABLED: "1"
      GOFLAGS: "-buildvcs=false"

  - label: ":hammer: Build"
    command: go build -v ./...
    agents: *dind
    env: *go_build_env

  - label: ":books: Docs Check"
    command: bash scripts/check-docs.sh
    soft_fail: true
    agents: *dind
    env: *go_env

  - label: ":terraform: Examples fmt"
    command: terraform fmt -check -recursive examples/
    agents: *dind

  - label: ":terraform: Examples validate"
    command: bash scripts/validate-examples.sh
    agents: *dind
    env: *go_build_env

  - label: ":rocket: GoReleaser check"
    command: |
      GORELEASER_VERSION=$$(curl -fsSLI -o /dev/null -w "%{url_effective}" https://github.com/goreleaser/goreleaser/releases/latest | sed "s|.*/tag/||")
      curl -fsSL "https://github.com/goreleaser/goreleaser/releases/download/$${GORELEASER_VERSION}/goreleaser_Linux_x86_64.tar.gz" \
        | tar -xz -C /tmp goreleaser
      /tmp/goreleaser check
    agents: *dind
    env: *go_env

  - wait

  # ── Stage 4: Acceptance Test Coverage (no credentials needed) ─────────

  - label: ":white_check_mark: Acc Test Coverage"
    command: go test -v -run TestAccCoverage ./komodor/...
    agents: *dind
    env: *go_env

  - wait

  # ── Stage 5: Acceptance Tests (concurrency-locked, requires credentials) ─

  - label: ":terraform: Acceptance Tests"
    command: |
      go mod download
      TF_ACC=1 go test -v -run TestAcc ./komodor/... -timeout 60m
    concurrency: 1
    concurrency_group: "komodor/terraform-provider/e2e"
    agents: *dind
    plugins:
      - zacharymctague/aws-ssm#v1.0.0:
          parameters:
            KOMODOR_API_KEY: /app/ci/terraform-provider/KOMODOR-API-KEY
    env:
      GO111MODULE: "on"
      KOMODOR_API_KEY: "$KOMODOR_API_KEY"
      KOMODOR_API_URL: "$KOMODOR_API_URL"
